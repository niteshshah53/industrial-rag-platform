server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Increase timeout for long LLM inference calls (can take 5-10 s on CPU)
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    # ── API proxy ──────────────────────────────────────────────────────────────
    # Strip /api prefix and forward to the FastAPI container.
    # e.g. GET /api/v1/documents → GET http://app:8000/v1/documents
    location /api/ {
        proxy_pass http://app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow large file uploads (100 MB)
        client_max_body_size 100M;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # Every non-asset request returns index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
